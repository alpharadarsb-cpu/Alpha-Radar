<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <defs>
    <!-- Outer arc gold gradient -->
    <linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8C6010"/>
    </linearGradient>
    <!-- Inner arc warm deep gold -->
    <linearGradient id="sg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8940A"/>
      <stop offset="100%" stop-color="#A07010"/>
    </linearGradient>
    <!-- Arrow gradient -->
    <linearGradient id="sg3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#F0D060"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="sglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- OUTER ARC — open gap at top-right (~40deg gap), stroke width 4.5 -->
  <!-- Full circle minus top-right gap: from ~50deg to ~310deg (going clockwise) -->
  <path d="M 41.5 13.5 A 22 22 0 1 0 43 28" 
    fill="none" stroke="url(#sg1)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- MIDDLE ARC — same gap, smaller radius -->
  <path d="M 37.5 17.5 A 15 15 0 1 0 39 28" 
    fill="none" stroke="url(#sg2)" stroke-width="4" stroke-linecap="round"/>

  <!-- INNER ARC — same gap, smallest radius -->
  <path d="M 33.5 21 A 8 8 0 1 0 35 28" 
    fill="none" stroke="url(#sg2)" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.85"/>

  <!-- CENTER DOT — warm deep gold -->
  <circle cx="28" cy="28" r="4.5" fill="url(#sg2)" filter="url(#sglow)"/>
  <circle cx="28" cy="28" r="2" fill="#FFF0C0" fill-opacity="0.8"/>

  <!-- ARROW — from center, rising to upper-right, breaking through outer arc -->
  <!-- Line from center to tip -->
  <line x1="31" y1="25" x2="51" y2="6" 
    stroke="url(#sg3)" stroke-width="4" stroke-linecap="round" filter="url(#sglow)"/>
  <!-- Arrowhead -->
  <polygon points="51,6 42,11 47,16" fill="url(#sg3)" filter="url(#sglow)"/>
</svg>