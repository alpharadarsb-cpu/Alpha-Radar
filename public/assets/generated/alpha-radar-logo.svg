<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <defs>
    <radialGradient id="radarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#B8922A"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#C6A75E"/>
    </linearGradient>
  </defs>

  <!-- Radar glow background -->
  <circle cx="22" cy="22" r="18" fill="url(#radarGlow)"/>

  <!-- Concentric rings -->
  <circle cx="22" cy="22" r="17" stroke="#C6A75E" stroke-width="0.8" stroke-opacity="0.5"/>
  <circle cx="22" cy="22" r="12" stroke="#C6A75E" stroke-width="0.8" stroke-opacity="0.5"/>
  <circle cx="22" cy="22" r="7"  stroke="#C6A75E" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- Crosshairs -->
  <line x1="22" y1="5"  x2="22" y2="39" stroke="#C6A75E" stroke-width="0.6" stroke-opacity="0.35"/>
  <line x1="5"  y1="22" x2="39" y2="22" stroke="#C6A75E" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- Sweep wedge (static) -->
  <path d="M22 22 L37 14.5 A17 17 0 0 1 38.5 22 Z" fill="url(#goldGrad)" opacity="0.22"/>

  <!-- Sweep line -->
  <line x1="22" y1="22" x2="38.5" y2="22" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Blip dots -->
  <circle cx="31" cy="16" r="1.8" fill="#D4AF37" opacity="0.9"/>
  <circle cx="31" cy="16" r="3.5" fill="#D4AF37" opacity="0.18"/>
  <circle cx="15" cy="28" r="1.2" fill="#D4AF37" opacity="0.55"/>
  <circle cx="26" cy="30" r="1.0" fill="#D4AF37" opacity="0.4"/>

  <!-- Center dot -->
  <circle cx="22" cy="22" r="1.5" fill="#D4AF37"/>

  <!-- Outer border ring — slightly brighter -->
  <circle cx="22" cy="22" r="17" stroke="url(#goldGrad)" stroke-width="1.2" fill="none" opacity="0.7"/>

  <!-- Wordmark: "Alpha" -->
  <text x="48" y="17"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="800"
    letter-spacing="0.5"
    fill="url(#textGrad)">ALPHA</text>

  <!-- Wordmark: "Radar" — slightly lighter -->
  <text x="48" y="32"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="13"
    font-weight="500"
    letter-spacing="2.5"
    fill="#C6A75E"
    opacity="0.85">RADAR</text>

  <!-- Thin gold divider between words -->
  <line x1="48" y1="21" x2="115" y2="21" stroke="#C6A75E" stroke-width="0.5" opacity="0.3"/>
</svg>